name: CI ROCm Sanitizers

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      repository:
        description: 'Repository to checkout'
        required: false
        type: string
        default: 'openxla/xla'
      ref:
        description: 'Git ref to checkout'
        required: false
        type: string
        default: 'main'
      run_sanitizers:
        description: 'Set to true to run sanitizers'
        required: false
        type: boolean
        default: true
    secrets:
      RBE_CI_CERT:
        required: true
      RBE_CI_KEY:
        required: true
  pull_request_target:
    types: [labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_number }}-${{ github.run_id }}
  cancel-in-progress: true

jobs:
  execute-xla-ut-sanitizers:
    if: inputs.run_sanitizers || github.event.label.name == 'sanitizers'
    runs-on: linux-xla-do-mi350x-4
    strategy:
      fail-fast: false
      matrix:
        mode:
          - name: "asan"
            configs:
              - "--config=rocm_ci_hermetic"
              - "--config=rocm_rbe"
              - "--config=asan"
              - "--spawn_strategy=local"
              - "--strategy=TestRunner=local"
              - "--flaky_test_attempts=1"
              - "--local_test_jobs=4"
              - "--repo_env=ROCM_DISTRO_URL=https://rocm.nightlies.amd.com/tarball-asan/therock-dist-linux-gfx950-dcgpu-7.15.0a20260714.tar.gz"
              - "--repo_env=ROCM_DISTRO_HASH=fe5e5898669d35a1983fc59f160f35ff535711b8a0bc7c77ecfa1ac3e2da72f8"
          - name: "tsan"
            configs:
              - "--config=rocm_ci"
              - "--config=rocm_rbe"
              - "--config=tsan"
              - "--spawn_strategy=local"
              - "--strategy=TestRunner=local"
              - "--flaky_test_attempts=1"
              - "--local_test_jobs=4"
    container:
      # set in https://github.com/ROCm/xla/settings/variables/actions
      image: ${{ vars.DOCKER_IMAGE }}
      options: >-
        --device=/dev/dri
        --device=/dev/kfd
        --shm-size=16G
        --cap-add=SYS_PTRACE
        --security-opt=seccomp=unconfined
      volumes:
        - /tmp/bazel-cache:/root/.cache/bazel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.repository || github.event.pull_request.head.repo.full_name }}
          ref: ${{ inputs.ref || github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Get RBE cluster keys
        env:
          RBE_CI_CERT: ${{ secrets.RBE_CI_CERT }}
          RBE_CI_KEY: ${{ secrets.RBE_CI_KEY }}
        run: |
          mkdir -p /tf/certificates
          echo "$RBE_CI_CERT" > /tf/certificates/ci-cert.crt
          echo "$RBE_CI_KEY" > /tf/certificates/ci-cert.key
          mkdir -p /data
          echo "$RBE_CI_CERT" > /data/ci-cert.crt
          echo "$RBE_CI_KEY" > /data/ci-cert.key

      - name: CPU Info
        run: lscpu

      - name: ROCm info
        run: /opt/rocm/bin/rocminfo

      - name: Test XLA [${{ matrix.mode.name }}] [single_gpu]
        run: |
          build_tools/rocm/run_xla_ci_build.sh \
            --config=ci_single_gpu \
            --local_test_jobs=4 \
            --repo_env=TF_ROCM_RBE_SINGLE_GPU_POOL=linux_x64_gpu_gfx90a \
            --repo_env=TF_ROCM_AMDGPU_TARGETS=gfx950 \
            --repo_env=TF_ROCM_RBE_DOCKER_IMAGE=${{ vars.DOCKER_IMAGE }} \
            --jobs=30 \
            --bes_keywords=xla \
            --bes_keywords=single_gpu \
            --bes_keywords=sanitizers \
            ${{ join(matrix.mode.configs, ' ') }} \
            -- \
            //xla/...

      - name: Test XLA [${{ matrix.mode.name }}] [multi_gpu]
        if: always() && !cancelled()
        run: |
          build_tools/rocm/run_xla_ci_build.sh \
            --config=ci_multi_gpu \
            --local_test_jobs=1 \
            --repo_env=TF_ROCM_AMDGPU_TARGETS=gfx950 \
            --repo_env=TF_ROCM_RBE_DOCKER_IMAGE=${{ vars.DOCKER_IMAGE }} \
            --bes_keywords=xla \
            --bes_keywords=multi_gpu \
            --bes_keywords=sanitizers \
            ${{ join(matrix.mode.configs, ' ') }} \
            -- \
            //xla/...

      - name: Test XLA [${{ matrix.mode.name }}] [rocm_cpu]
        if: always() && !cancelled()
        run: |
          build_tools/rocm/run_xla_ci_build.sh \
            --config=rocm_ci \
            --config=rocm_rbe \
            --config=ci_rocm_cpu \
            --local_test_jobs=200 \
            --repo_env=TF_ROCM_AMDGPU_TARGETS=gfx950 \
            --repo_env=TF_ROCM_RBE_DOCKER_IMAGE=${{ vars.DOCKER_IMAGE }} \
            --bes_keywords=xla \
            --bes_keywords=cpu \
            --bes_keywords=sanitizers \
            ${{ join(matrix.mode.configs, ' ') }} \
            -- \
            //xla/...
