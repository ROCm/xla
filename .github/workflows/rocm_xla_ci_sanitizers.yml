name: CI ROCm Sanitizers

permissions:
  contents: read

on:
  pull_request_target:
    types: [labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  execute-xla-ut-sanitizers:
    # Only run if the "sanitizers" label was added
    if: github.event.label.name == 'sanitizers'
    runs-on: linux-mi250-4
    strategy:
      fail-fast: false
      matrix:
        mode:
          - {name: "asan", configs: ["--config=rocm_ci", "--config=asan"]}
          - {name: "tsan", configs: ["--config=rocm_ci", "--config=tsan"]}
    container:
      image: rocm/tensorflow-build@sha256:7fcfbd36b7ac8f6b0805b37c4248e929e31cf5ee3af766c8409dd70d5ab65faa
      options: >-
        --device=/dev/dri
        --device=/dev/kfd
        --shm-size=16G
        --cap-add=SYS_PTRACE
        --security-opt=seccomp=unconfined
      volumes:
        - /tmp/bazel-cache:/root/.cache/bazel
    env:
      DOCKER_IMAGE: rocm/tensorflow-build@sha256:7fcfbd36b7ac8f6b0805b37c4248e929e31cf5ee3af766c8409dd70d5ab65faa
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Checkout rocm-dev-infram branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ROCm/xla
          ref: rocm-dev-infram
          path: rocm-dev-infram-checkout
          persist-credentials: false

      - name: Mount execute_ci_build.sh from rocm-dev-infram
        run: |
          cp rocm-dev-infram-checkout/build_tools/rocm/execute_ci_build.sh build_tools/rocm/execute_ci_build.sh
          chmod +x build_tools/rocm/execute_ci_build.sh

      - name: Get RBE cluster keys
        env:
          RBE_CI_CERT: ${{ secrets.RBE_CI_CERT }}
          RBE_CI_KEY: ${{ secrets.RBE_CI_KEY }}
        run: |
          mkdir -p /tf/certificates
          echo "$RBE_CI_CERT" > /tf/certificates/ci-cert.crt
          echo "$RBE_CI_KEY" > /tf/certificates/ci-cert.key

      - name: CPU Info
        run: lscpu

      - name: ROCm info
        run: /opt/rocm/bin/rocminfo

      - name: Test XLA [${{ matrix.mode.name }}] [single_gpu]
        run: |
          build_tools/rocm/execute_ci_build.sh \
            ${{ join(matrix.mode.configs, ' ') }} \
            --config=rocm_rbe \
            --config=ci_single_gpu \
            --local_test_jobs=4 \
            --curses=no \
            --color=yes \
            --spawn_strategy=local \
            --execution_log_compact_file=execution_log.binpb.zst \
            --test_sharding_strategy=disabled \
            --repo_env=TF_ROCM_AMDGPU_TARGETS=gfx90a,gfx942 \
            --remote_download_outputs=minimal \
            --repo_env=TF_ROCM_RBE_DOCKER_IMAGE=${{ env.DOCKER_IMAGE }} \
            --config=xla_sgpu \

      - name: Test XLA [${{ matrix.mode.name }}] [multi_gpu]
        if: always()
        run: |
          build_tools/rocm/execute_ci_build.sh \
            ${{ join(matrix.mode.configs, ' ') }} \
            --config=rocm_rbe \
            --config=ci_multi_gpu \
            --spawn_strategy=local \
            --strategy=TestRunner=local \
            --local_test_jobs=1 \
            --curses=no \
            --color=yes \
            --execution_log_compact_file=execution_log.binpb.zst \
            --test_sharding_strategy=disabled \
            --repo_env=TF_ROCM_AMDGPU_TARGETS=gfx90a,gfx942 \
            --remote_download_outputs=minimal \
            --repo_env=TF_ROCM_RBE_DOCKER_IMAGE=${{ env.DOCKER_IMAGE }} \
            --config=xla_mgpu \
