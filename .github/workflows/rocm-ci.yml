name: ROCm CI

on:
  workflow_dispatch:
  push:
    branches:
      - rocm-main
      - 'rocm-jaxlib-v*'
  pull_request:
    branches:
      - rocm-main
      - 'rocm-jaxlib-v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test-and-analyze-xla:
    runs-on: mi-250
    container:
      image: rocm/tensorflow-build:latest-jammy-python3.11-rocm6.3.0
      options:
        --device=/dev/kfd
        --device=/dev/dri
        --ipc=host
        --shm-size=16G
        --group-add=video
        --cap-add=SYS_PTRACE
        --security-opt=seccomp=unconfined
    steps:
      - name: Get Bazel cache key
        id: cache-key
        run: echo "::set-output name=cachekey::$(date '+%Y-%m-%d')"
      #- name: Bazel cache
      #  uses: actions/cache@v4
      #  with:
      #    path: ~/.cache/bazel
      #    key: ${{ steps.cache-key.outputs.cachekey }}-${{ hashFiles('WORKSPACE', '.bazelrc', '.bazelversion') }}
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Test XLA
        run: build_tools/rocm/run_xla.sh
  build-jax-plugin:
    runs-on: mi-250
    env:
      BASE_DOCKER: "ubuntu:22.04"
      PYTHON_VERSION: "3.10.12"
      ROCM_VERSION: "6.3.3"
      JAX_BRANCH: "rocm-jaxlib-v0.5.0"
      WORKSPACE_DIR:  workdir_jax_${{ github.run_id }}_${{ github.run_number }}_${{ github.run_attempt }} 
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          path: ${{ env.WORKSPACE_DIR }}
          ref: ${{ env.JAX_BRANCH }}
          repository: ROCm/jax
      - name: Build JAX wheels
        run: |
          pushd $WORKSPACE_DIR
          python3 ./build/rocm/ci_build \
            --compiler clang \
            --base-docker $BASE_DOCKER \
            --python-versions $PYTHON_VERSION \
            --rocm-version $ROCM_VERSION \
            dist_wheels

