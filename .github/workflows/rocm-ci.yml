name: ROCm CI

on:
  workflow_dispatch:
  push:
    branches:
      - rocm-main
      - 'rocm-jaxlib-v*'
  pull_request:
    branches:
      - rocm-main
      - 'rocm-jaxlib-v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test-and-analyze-xla:
    runs-on: mi-250
    env:
      WORKSPACE_DIR: $workdir_${{ github.run_id }}_${{ github.run_number }}_${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          path: ${{ env.WORKSPACE_DIR }}
      - name: Test XLA
        run: |
          pushd $WORKSPACE_DIR
          docker run --rm \
            -w /tf/xla \
            --network=host \
            --device=/dev/kfd \
            --device=/dev/dri \
            --ipc=host \
            --shm-size 16G \
            --group-add video \
            --cap-add=SYS_PTRACE \
            --security-opt seccomp=unconfined \
            -v $GITHUB_WORKSPACE/$WORKSPACE_DIR:/tf/xla \
            rocm/tensorflow-build:latest-jammy-python3.11-rocm6.3.0 \
            "./build_tools/rocm/run_xla.sh && bazel analyze-profile /tf/pkg/profile.json.gz"
            # TODO: Maybe use multi-GPU here?
      - name: Archive test analysis
        run: |
          echo "TODO: Archive the test results"
  build-jax-plugin:
    runs-on: mi-250
    env:
      JAX_BRANCH: "rocm-jaxlib-v0.5.1"
