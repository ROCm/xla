name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 */3 * * 1-5'  # Every 3 hours, Monday-Friday
    - cron: '0 9 * * 0,6'    # Once daily at 09:00 UTC, Saturday-Sunday
  workflow_dispatch:          # Allow manual trigger

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.ROCM_REPO_MANAGEMENT_APP_CLIENT_ID }}
          private-key: ${{ secrets.ROCM_REPO_MANAGEMENT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-workflows: write

      - name: Sync fork with upstream
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api \
            --method POST \
            /repos/${{ github.repository }}/merge-upstream \
            -f branch=main
