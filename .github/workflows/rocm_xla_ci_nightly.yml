name: CI ROCm Nightly

permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    # Run every 24 hours at 3:47 AM UTC
    - cron: '47 3 * * *'
  pull_request_target:
    types: [labeled]
  pull_request:
    branches:
      - rocm-dev-infra
    paths:
      - '.github/workflows/rocm_xla_ci_nightly.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  execute-xla-ut-nightly:
    # Run on schedule, workflow_dispatch, "nightly-pipeline" label, or PR to rocm-dev-infra with workflow changes
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event.label.name == 'nightly-pipeline' || (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'rocm-dev-infra')
    runs-on: ${{ matrix.mode.runner }}
    strategy:
      fail-fast: false
      matrix:
        mode:
          - name: "default"
            configs: ["--config=rocm_ci"]
            rbe_docker_image: "DOCKER_IMAGE"
            runner: "linux-xla-do-mi350x-1"
          - name: "hermetic"
            configs:
              - "--config=rocm_ci_hermetic"
              - "--repo_env=ROCM_DISTRO_URL=https://repo.amd.com/rocm/tarball/therock-dist-linux-gfx950-dcgpu-7.12.0.tar.gz"
              - "--repo_env=ROCM_DISTRO_HASH=bd5e12f6f05fd240efa6c50662379cba991f6faa9df67e270fbe5bb8cffc0ab9"
              - "--repo_env=SYSROOT_DIST=linux_glibc_2_31"
              - "--repo_env=ROCM_PATH="
            rbe_docker_image: "DOCKER_IMAGE_HERMETIC"
            runner: "linux-xla-do-mi350x-1"
          - name: "asan"
            configs: ["--config=rocm_ci", "--config=asan", "--strategy=TestRunner=local", "--flaky_test_attempts=1", "--local_test_jobs=4"]
            rbe_docker_image: "DOCKER_IMAGE"
            runner: "linux-xla-do-mi350x-4"
          - name: "tsan"
            configs: ["--config=rocm_ci", "--config=tsan", "--strategy=TestRunner=local", "--flaky_test_attempts=1", "--local_test_jobs=4"]
            rbe_docker_image: "DOCKER_IMAGE"
            runner: "linux-xla-do-mi350x-4"
    container:
      # set in https://github.com/ROCm/xla/settings/variables/actions
      image: ${{ vars.DOCKER_IMAGE }}
      options: >-
        --device=/dev/dri
        --device=/dev/kfd
        --shm-size=16G
        --cap-add=SYS_PTRACE
        --security-opt=seccomp=unconfined
      volumes:
        - /tmp/bazel-cache:/root/.cache/bazel
        
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # This workflow runs against the upstream XLA source tree.
          repository: openxla/xla
          ref: main
          persist-credentials: false

      - name: Populate missing upstream ROCm build tools
        if: ${{ hashFiles('build_tools/rocm/run_xla_ci_build.sh') == '' }}
        run: |
          tmpdir="$(mktemp -d)"
          git clone --depth 1 --filter=blob:none --sparse https://github.com/openxla/xla.git "$tmpdir"
          git -C "$tmpdir" sparse-checkout set build_tools/rocm
          cp -a "$tmpdir/build_tools/rocm/." build_tools/rocm/

      - name: Get RBE cluster keys
        env:
          RBE_CI_CERT: ${{ secrets.RBE_CI_CERT }}
          RBE_CI_KEY: ${{ secrets.RBE_CI_KEY }}
        run: |
          mkdir -p /data
          echo "$RBE_CI_CERT" > /data/ci-cert.crt
          echo "$RBE_CI_KEY" > /data/ci-cert.key

      - name: CPU Info
        run: lscpu

      - name: ROCm info
        run: |
          if command -v rocminfo >/dev/null 2>&1; then
            "$(command -v rocminfo)"
          elif [ -x /opt/rocm/bin/rocminfo ]; then
            /opt/rocm/bin/rocminfo
          else
            echo "rocminfo not found in this container image; skipping diagnostic step."
          fi

      - name: Test XLA [${{ matrix.mode.name }}] [single_gpu]
        run: |
          build_tools/rocm/run_xla_ci_build.sh \
            "--config=rocm_rbe" \
            --config=ci_single_gpu \
            --local_test_jobs=1 \
            --repo_env=TF_ROCM_RBE_SINGLE_GPU_POOL=linux_x64_gpu_do_gfx950 \
            --repo_env=TF_ROCM_AMDGPU_TARGETS=gfx950 \
            --repo_env=TF_ROCM_RBE_DOCKER_IMAGE=${{ vars[matrix.mode.rbe_docker_image] }} \
            --jobs=30 \
            --spawn_strategy=local \
            --bes_keywords=xla \
            --bes_keywords=single_gpu \
            --bes_keywords=nightly \
            ${{ join(matrix.mode.configs, ' ') }} \
            -- \
            //xla/...

      - name: Test XLA [${{ matrix.mode.name }}] [multi_gpu]
        if: always() && !cancelled()
        run: |
          build_tools/rocm/run_xla_ci_build.sh \
            --config=ci_multi_gpu \
            --config=rocm_rbe \
            --test_strategy=exclusive \
            --spawn_strategy=local \
            --strategy=TestRunner=local \
            --repo_env=TF_ROCM_RBE_SINGLE_GPU_POOL=linux_x64_gpu_do_gfx950 \
            --repo_env=TF_ROCM_AMDGPU_TARGETS=gfx950 \
            --repo_env=TF_ROCM_RBE_DOCKER_IMAGE=${{ vars[matrix.mode.rbe_docker_image] }} \
            --bes_keywords=xla \
            --bes_keywords=multi_gpu \
            --bes_keywords=nightly \
            ${{ join(matrix.mode.configs, ' ') }} \
            -- \
            //xla/...

      - name: Test XLA [${{ matrix.mode.name }}] [rocm_cpu]
        if: always() && !cancelled()
        run: |
          build_tools/rocm/run_xla_ci_build.sh \
            --config=rocm_ci \
            --config=rocm_rbe \
            --config=ci_rocm_cpu \
            --local_test_jobs=200 \
            --spawn_strategy=local \
            --repo_env=TF_ROCM_RBE_SINGLE_GPU_POOL=linux_x64_gpu_do_gfx950 \
            --repo_env=TF_ROCM_AMDGPU_TARGETS=gfx950 \
            --repo_env=TF_ROCM_RBE_DOCKER_IMAGE=${{ vars[matrix.mode.rbe_docker_image] }} \
            --bes_keywords=xla \
            --bes_keywords=cpu \
            --bes_keywords=nightly \
            ${{ join(matrix.mode.configs, ' ') }} \
            -- \
            //xla/...
