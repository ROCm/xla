name: CI ROCm Nightly

permissions:
  contents: read

on:
  push:
    branches:
      - leo/*
  schedule:
    # Run every 24 hours at 3:47 AM UTC
    - cron: '47 3 * * *'
  pull_request_target:
    types: [labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  execute-xla-ut-nightly:
    # Run on schedule or if the "nightly-pipeline" label was added
    # if: github.event_name == 'schedule' || github.event.label.name == 'nightly-pipeline'
    runs-on: linux-mi250-4
    strategy:
      fail-fast: false
      matrix:
        mode:
          - {name: "default", configs: ["--config=rocm_ci", "--config=rocm_rbe"], container: "DOCKER_IMAGE"}
          - {name: "hermetic", configs: ["--config=rocm_ci_hermetic", "--config=rocm_rbe"], container: "DOCKER_IMAGE_HERMETIC"}
          - {name: "asan", configs: ["--config=rocm_ci", "--config=asan"], container: "DOCKER_IMAGE"}
          - {name: "tsan", configs: ["--config=rocm_ci", "--config=tsan", "--strategy=TestRunner=local"], container: "DOCKER_IMAGE"}
    container:
      # set in https://github.com/ROCm/xla/settings/variables/actions
      image: ${{ vars[matrix.mode.container] }}
      options: >-
        --device=/dev/dri
        --device=/dev/kfd
        --shm-size=16G
        --cap-add=SYS_PTRACE
        --security-opt=seccomp=unconfined
      volumes:
        - /tmp/bazel-cache:/root/.cache/bazel
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # This workflow runs against the upstream XLA source tree.
          repository: openxla/xla
          ref: main
          persist-credentials: false

      - name: Populate missing upstream ROCm build tools
        if: ${{ hashFiles('build_tools/rocm/run_xla_ci_build.sh') == '' }}
        run: |
          tmpdir="$(mktemp -d)"
          git clone --depth 1 --filter=blob:none --sparse https://github.com/openxla/xla.git "$tmpdir"
          git -C "$tmpdir" sparse-checkout set build_tools/rocm
          cp -a "$tmpdir/build_tools/rocm/." build_tools/rocm/

      - name: Patch stale upstream ROCm MGPU target labels
        run: |
          sed -i \
            -e 's#//xla/tests:collective_ops_e2e_test#//xla/backends/gpu/tests:collective_ops_e2e_test#' \
            -e 's#//xla/tests:collective_pipeline_parallelism_test#//xla/backends/gpu/tests:collective_pipeline_parallelism_test#' \
            -e 's#//xla/tests:replicated_io_feed_test#//xla/backends/gpu/tests:replicated_io_feed_test#' \
            build_tools/rocm/rocm_xla.bazelrc

      - name: Fetch execute_ci_build.sh from rocm-dev-infra
        run: |
          wget -O build_tools/rocm/execute_ci_build.sh https://raw.githubusercontent.com/ROCm/xla/refs/heads/rocm-dev-infra/build_tools/rocm/execute_ci_build.sh
          chmod +x build_tools/rocm/execute_ci_build.sh

      - name: Get RBE cluster keys
        env:
          RBE_CI_CERT: ${{ secrets.RBE_CI_CERT }}
          RBE_CI_KEY: ${{ secrets.RBE_CI_KEY }}
        run: |
          mkdir -p /data
          echo "$RBE_CI_CERT" > /data/ci-cert.crt
          echo "$RBE_CI_KEY" > /data/ci-cert.key

      - name: CPU Info
        run: lscpu

      - name: ROCm info
        run: |
          if command -v rocminfo >/dev/null 2>&1; then
            "$(command -v rocminfo)"
          elif [ -x /opt/rocm/bin/rocminfo ]; then
            /opt/rocm/bin/rocminfo
          else
            echo "rocminfo not found in this container image; skipping diagnostic step."
          fi

      - name: Test XLA [${{ matrix.mode.name }}] [single_gpu]
        run: |
          build_tools/rocm/execute_ci_build.sh \
            ${{ join(matrix.mode.configs, ' ') }} \
            --config=ci_single_gpu \
            --local_test_jobs=4 \
            --repo_env=TF_ROCM_AMDGPU_TARGETS=gfx90a,gfx942 \
            --repo_env=TF_ROCM_RBE_DOCKER_IMAGE=${{ vars[matrix.mode.container] }} \
            --config=xla_sgpu

      - name: Test XLA [${{ matrix.mode.name }}] [multi_gpu]
        if: always() && !cancelled()
        run: |
          build_tools/rocm/execute_ci_build.sh \
            ${{ join(matrix.mode.configs, ' ') }} \
            --config=ci_multi_gpu \
            --local_test_jobs=1 \
            --strategy=TestRunner=local \
            --repo_env=TF_ROCM_AMDGPU_TARGETS=gfx90a,gfx942 \
            --repo_env=TF_ROCM_RBE_DOCKER_IMAGE=${{ vars[matrix.mode.container] }} \
            --config=xla_mgpu
