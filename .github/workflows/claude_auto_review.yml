name: Claude Auto Review

on:
  pull_request_target:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: number

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: github.event.label.name == 'claude-review'
    runs-on: build-only-xla
    permissions:
      contents: read
      pull-requests: write
      id-token: write  # Required by claude-code-action for internal OIDC auth.
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || format('refs/pull/{0}/head', inputs.pr_number) }}

      # The PR branch may not have the .claude/ directory (skills, settings) since it
      # only lives on the default branch. Overlay it so Claude Code can find the skill.
      - name: Fetch .claude config from default branch
        run: |
          git fetch origin ${{ github.event.repository.default_branch }}
          git restore --source=origin/${{ github.event.repository.default_branch }} --worktree -- .claude
          find .claude -type f | sort

      # =============================================================================
      # WORKAROUND: Pre-install and warmup Claude Code
      # =============================================================================
      # Without this step, claude-code-action hangs indefinitely after printing
      # "Running Claude with prompt from file: ..." with no LLM requests being made.
      #
      # This warmup step:
      # - Pre-installs Claude Code before the action runs
      # - Runs a simple command to complete first-run initialization
      #
      # TODO: This workaround may be addressing temporary issues in claude-code-action,
      # Claude Code CLI, or server-side. The same hang was observed even with standard
      # console_auth setup (without LLM gateway). Re-test periodically to check if
      # this workaround is still needed.
      # =============================================================================
      - name: Install and Warmup Claude Code
        timeout-minutes: 2
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_CUSTOM_HEADERS: "Ocp-Apim-Subscription-Key: ${{ secrets.LLM_GATEWAY_KEY }}"
          ANTHROPIC_API_KEY: "sk-ant-dummy-gateway-key"
          ANTHROPIC_MODEL: "Claude-Sonnet-4.6"
        run: |
          curl -fsSL https://claude.ai/install.sh | bash

          export PATH="$HOME/.local/bin:$PATH"

          claude --version

          timeout 60 claude --print -p "Say OK" || echo "Warmup complete (exit ok)"

      # claude-code-action auto-configures the GitHub inline comment MCP server for
      # pull_request_target events, but not for workflow_dispatch. We create the config
      # manually so that the inline comment tool works consistently for both triggers.
      - name: Create MCP config
        id: mcp
        run: |
          server=$(find "$(dirname "$RUNNER_WORKSPACE")/_actions/anthropics/claude-code-action" -name "github-inline-comment-server.ts" 2>/dev/null | head -1)
          config=/tmp/mcp-config.json
          cat > "$config" << EOF
          {
            "mcpServers": {
              "github_inline_comment": {
                "command": "bun",
                "args": ["run", "$server"],
                "env": {
                  "REPO_OWNER": "${{ github.repository_owner }}",
                  "REPO_NAME": "${{ github.event.repository.name }}",
                  "PR_NUMBER": "${{ github.event.pull_request.number || inputs.pr_number }}",
                  "GITHUB_API_URL": "${{ github.api_url }}"
                }
              }
            }
          }
          EOF
          echo "file=$config" >> $GITHUB_OUTPUT

      - name: Review Pull Request
        id: claude-code
        timeout-minutes: 30
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_CUSTOM_HEADERS: "Ocp-Apim-Subscription-Key: ${{ secrets.LLM_GATEWAY_KEY }}"
          ANTHROPIC_MODEL: "Claude-Opus-4.6"
          ANTHROPIC_DEFAULT_OPUS_MODEL: "Claude-Opus-4.6"
          ANTHROPIC_DEFAULT_SONNET_MODEL: "Claude-Sonnet-4.6"
          ANTHROPIC_DEFAULT_HAIKU_MODEL: "Claude-Haiku-4.5"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: "sk-ant-dummy-gateway-key"
          show_full_output: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}

            Note: The PR branch is already checked out in the current working directory.

            ## Step 1 — Check for previous Claude review comments
            Run this command to determine whether previous Claude inline comments exist on this PR:
            ```
            gh api --paginate "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number || inputs.pr_number }}/comments" | jq -s 'add // [] | [.[] | select(.user.login == "claude[bot]" and .in_reply_to_id == null)] | length'
            ```

            ## Step 2 — Fresh Review
            Run the /review-xla-pr skill with only the PR number as the argument
            (e.g. /review-xla-pr 640). This produces a fresh set of findings from the diff.
            Do NOT post anything to GitHub yet.

            ## Step 3 — Post Results

            **If Step 1 returned 0 (no previous Claude comments — initial review):**
            Post all findings directly:
            - Use `mcp__github_inline_comment__create_inline_comment` to post each finding
              inline on the relevant diff lines.

            **If Step 1 returned > 0 (previous Claude comments exist — re-review):**
            Run the /update-pr-review skill with only the PR number as the argument
            (e.g. /update-pr-review 640), passing the findings from Step 2 as context.
            This skill handles thread-aware updates (resolved replies, follow-up replies) and
            returns only genuinely new findings. Then use
            `mcp__github_inline_comment__create_inline_comment` to post those new findings only.
            Do NOT post inline comments for findings already handled as thread updates.

            **Always (both cases):**
            - Use `gh pr comment` to post ONLY a short top-level summary. Do NOT repeat
              individual findings in the top-level comment — those belong inline.
            - Do NOT post intermediate analysis steps or thinking-out-loud to the PR.
            - Only post GitHub comments — do not submit review text as messages.
            - NEVER post the same issue twice as a new inline comment.
          claude_args: |
            --allowedTools "Skill,mcp__github_inline_comment__create_inline_comment,Bash(gh *),Bash(git *),Bash(jq *),Bash(head *),Bash(grep *),Read,Grep,Glob" --mcp-config ${{ steps.mcp.outputs.file }}
          settings: |
            {
              "hasCompletedOnboarding": true
            }

      - name: Upload Claude Execution Log
        if: always() && steps.claude-code.outputs.execution_file != ''
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-log
          path: ${{ steps.claude-code.outputs.execution_file }}

      - name: Remove claude-review label
        if: always() && github.event.label.name == 'claude-review'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method DELETE \
            "/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels/claude-review" \
            || true
