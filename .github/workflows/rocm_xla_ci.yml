name: CI ROCm
permissions:
  contents: read
on:
  push:
    branches:
      - main
  workflow_call:

# Note: concurrency control is handled by the calling workflow (pr_event_dispatch.yml)
# to avoid deadlocks when used as a reusable workflow via workflow_call

jobs:
  execute-xla-ut:
    runs-on: linux-mi250-4
    container:
      image: rocm/tensorflow-build@sha256:7fcfbd36b7ac8f6b0805b37c4248e929e31cf5ee3af766c8409dd70d5ab65faa
      options: >-
        --init
        --network=host
        --device=/dev/dri
        --device=/dev/kfd
        --ipc=host
        --shm-size=16G
        --cap-add=SYS_PTRACE
        --security-opt=seccomp=unconfined
      volumes:
        - /tmp/bazel-cache:/root/.cache/bazel
    env:
      DOCKER_IMAGE: rocm/tensorflow-build@sha256:7fcfbd36b7ac8f6b0805b37c4248e929e31cf5ee3af766c8409dd70d5ab65faa
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout rocAutomation
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ROCm/rocAutomation
          ref: jenkins-pipelines
          path: rocAutomation
          persist-credentials: false

      - name: Mount rocAutomation resources
        run: |
          # Copy resources to workspace so they're accessible within the container
          mkdir -p /workspace/build_tools/rocm
          cp -f rocAutomation/resources/upstream-xla-data/rocm_tag_filters.sh /workspace/build_tools/rocm/rocm_tag_filters.sh
          cp -f rocAutomation/resources/upstream-xla-data/execute_ci_build.sh /workspace/build_tools/rocm/execute_ci_build.sh
          chmod +x /workspace/build_tools/rocm/*.sh
          # Copy certificates
          mkdir -p /tf/certificates
          cp -r rocAutomation/resources/certificates/* /tf/certificates/

      - name: CPU Info
        run: lscpu

      - name: ROCm info
        run: /opt/rocm/bin/rocminfo

      - name: Test XLA [single_gpu]
        run: |
          build_tools/rocm/execute_ci_build.sh \
            --config=ci_single_gpu \
            --local_test_jobs=2 \
            --repo_env=TF_ROCM_RBE_SINGLE_GPU_POOL=linux_x64_gpu_gfx90a \
            --repo_env=TF_ROCM_RBE_DOCKER_IMAGE=${{ env.DOCKER_IMAGE }}

      - name: Test XLA [multi_gpu]
        if: always()
        run: |
          build_tools/rocm/execute_ci_build.sh \
            --config=ci_multi_gpu \
            --strategy=TestRunner=local \
            --local_test_jobs=2 \
            --repo_env=TF_ROCM_RBE_DOCKER_IMAGE=${{ env.DOCKER_IMAGE }}
